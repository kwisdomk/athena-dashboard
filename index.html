<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Athena · Liquid Glass Pro v2.0</title>
    <!-- Inter Font & Chart.js -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            /* 1. COLOR SYSTEM (Soft Apple Light) */
            --bg-0: #F7F8FC;
            --bg-1: #EEF1F7;
            --bg-gradient: linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 100%);
            
            --surface-core: rgba(255, 255, 255, 0.75);
            --surface-1: rgba(255, 255, 255, 0.55);
            --surface-2: rgba(255, 255, 255, 0.85);
            --surface-hover: rgba(0, 122, 255, 0.04);
            
            --border-soft: rgba(255, 255, 255, 0.5);
            --border-default: rgba(209, 213, 219, 0.4);
            
            --text-primary: #1D1D1F;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            
            --accent: #007AFF;
            --accent-soft: rgba(0, 122, 255, 0.08);
            
            --success: #34C759;
            --success-soft: rgba(52, 199, 89, 0.12);
            --warning: #FF9F0A;
            --warning-soft: rgba(255, 159, 10, 0.12);
            --danger: #FF3B30;
            --pending: #8E8E93;
            --pending-soft: rgba(142, 142, 147, 0.12);

            /* 2. GLASS SYSTEM */
            --blur-core: 30px;
            --blur-panel: 20px;
            --blur-row: 12px;
            
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.06);

            /* 3. TYPOGRAPHY SYSTEM */
            --font-family: "Inter", system-ui, -apple-system, sans-serif;
            --text-xs: 12px; --text-sm: 13.5px; --text-base: 15px; 
            --text-md: 18px; --text-lg: 24px; --text-xl: 32px;
            
            --weight-medium: 500; --weight-semibold: 600; --weight-bold: 700;

            /* 4. SPACING SYSTEM */
            --space-2: 8px; --space-3: 12px; --space-4: 16px;
            --space-5: 24px; --space-6: 32px; --space-7: 48px;

            /* 5. RADIUS SYSTEM */
            --radius-sm: 12px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 28px; --radius-pill: 999px;

            /* 6. MOTION SYSTEM */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --t-base: 250ms;
        }

        [data-theme="dark"] {
            --bg-0: #010101;
            --bg-1: #0A0A0C;
            --bg-gradient: radial-gradient(at 0% 0%, #1c1c1e 0%, #010101 100%);
            
            --surface-core: rgba(28, 28, 30, 0.75);
            --surface-1: rgba(28, 28, 30, 0.45);
            --surface-2: rgba(44, 44, 46, 0.85);
            
            --border-soft: rgba(255, 255, 255, 0.1);
            --border-default: rgba(255, 255, 255, 0.15);
            
            --text-primary: #FFFFFF;
            --text-secondary: #98989E;
            --text-muted: #636366;
            
            --accent: #0A84FF;
            --success: #30D158;
            --warning: #FFD60A;
            --danger: #FF453A;

            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: var(--font-family);
            color: var(--text-primary);
            padding: var(--space-6) var(--space-5);
            min-height: 100vh;
            line-height: 1.5;
            transition: background var(--t-base) var(--ease-smooth), color var(--t-base) var(--ease-smooth);
        }

        .workspace-container {
            max-width: 1240px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand h1 { font-size: var(--text-xl); font-weight: var(--weight-semibold); letter-spacing: -0.04em; }
        .brand h1 span { color: var(--accent); }
        .brand p { color: var(--text-secondary); font-size: var(--text-sm); margin-top: 4px; }

        .theme-toggle {
            background: var(--surface-1); backdrop-filter: blur(var(--blur-panel));
            border: 1px solid var(--border-soft); padding: 4px; border-radius: var(--radius-pill);
            display: flex; gap: 4px; box-shadow: var(--shadow-soft);
        }
        .theme-btn {
            background: transparent; color: var(--text-secondary); border: none;
            padding: 6px 16px; border-radius: var(--radius-pill); font-size: var(--text-xs); font-weight: var(--weight-semibold);
            cursor: pointer; transition: all var(--t-base) var(--ease-smooth); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .theme-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }

        /* --- TWO COLUMN LAYOUT --- */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-6);
            align-items: start;
        }
        @media (min-width: 1024px) { .layout-grid { grid-template-columns: 2fr 1fr; } }

        /* --- LAYER 1: COMMAND CORE --- */
        .command-core {
            background: var(--surface-core);
            backdrop-filter: blur(var(--blur-core));
            -webkit-backdrop-filter: blur(var(--blur-core));
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
            margin-bottom: var(--space-6);
        }
        
        .core-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: var(--space-5); }
        
        .target-focus { flex: 2; min-width: 250px; }
        .focus-label { font-size: var(--text-xs); font-weight: var(--weight-bold); color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-2); display: block; }
        .focus-title { font-size: var(--text-xl); font-weight: var(--weight-bold); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: var(--space-2); }
        .focus-meta { font-size: var(--text-sm); color: var(--text-secondary); }
        
        .core-stats { flex: 1; display: flex; flex-direction: column; gap: var(--space-4); min-width: 200px; border-left: 1px solid var(--border-default); padding-left: var(--space-5); }
        .stat-group .label { font-size: var(--text-xs); color: var(--text-secondary); text-transform: uppercase; font-weight: var(--weight-semibold); letter-spacing: 0.05em; }
        .stat-group .value { font-size: var(--text-lg); font-weight: var(--weight-bold); margin-top: 4px; }

        /* --- LAYER 2: EXECUTION SURFACE (Glass Rows) --- */
        .execution-surface {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .surface-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2); padding: 0 var(--space-2); }
        .surface-title { font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        .glass-row {
            background: var(--surface-1);
            backdrop-filter: blur(var(--blur-row));
            -webkit-backdrop-filter: blur(var(--blur-row));
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            padding: var(--space-4) var(--space-5);
            box-shadow: var(--shadow-soft);
            transition: all var(--t-base) var(--ease-smooth);
            cursor: pointer;
            overflow: hidden;
        }

        .glass-row:hover {
            background: var(--surface-2);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .glass-row.done-row { opacity: 0.5; }
        .glass-row.done-row:hover { opacity: 0.8; }
        .glass-row.done-row .item-title { text-decoration: line-through; }

        .row-primary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
        }

        .item-main { flex: 2; display: flex; align-items: center; gap: var(--space-3); }
        .prio-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .item-title { font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary); }
        
        .item-metrics { flex: 2; display: flex; justify-content: space-between; align-items: center; gap: var(--space-4); }
        .item-cost { font-size: var(--text-sm); font-weight: var(--weight-medium); font-family: monospace; color: var(--text-secondary); }
        .item-impact { font-size: var(--text-sm); color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .item-action { flex-shrink: 0; display: flex; align-items: center; gap: var(--space-3); }
        
        /* Progressive Disclosure (Hover/Click Details) */
        .row-secondary {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--t-base) var(--ease-smooth);
        }
        .glass-row:hover .row-secondary, .glass-row.expanded .row-secondary {
            grid-template-rows: 1fr;
        }
        .row-details-inner {
            overflow: hidden;
            display: flex;
            gap: var(--space-6);
            opacity: 0.7;
            font-size: var(--text-sm);
        }
        .glass-row:hover .row-details-inner, .glass-row.expanded .row-details-inner {
            padding-top: var(--space-4);
            margin-top: var(--space-4);
            border-top: 1px solid var(--border-default);
        }

        /* --- LAYER 3: INTELLIGENCE STRIP --- */
        .intelligence-strip {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .glass-panel {
            background: var(--surface-1);
            backdrop-filter: blur(var(--blur-panel));
            -webkit-backdrop-filter: blur(var(--blur-panel));
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-soft);
        }

        .panel-title { font-size: var(--text-xs); font-weight: var(--weight-bold); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-4); }

        .filter-pill {
            background: rgba(0,0,0,0.04); border: 1px solid transparent; padding: 8px 16px;
            border-radius: var(--radius-pill); font-size: var(--text-sm); font-weight: var(--weight-medium);
            color: var(--text-secondary); cursor: pointer; transition: all var(--t-base);
            width: 100%; text-align: left; margin-bottom: var(--space-2);
        }
        [data-theme="dark"] .filter-pill { background: rgba(255,255,255,0.04); }
        .filter-pill:hover { background: var(--accent-soft); color: var(--accent); }
        .filter-pill.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }

        .health-item { display: flex; justify-content: space-between; align-items: center; padding: var(--space-3) 0; border-bottom: 1px solid var(--border-default); font-size: var(--text-sm); }
        .health-item:last-child { border-bottom: none; padding-bottom: 0; }
        .health-val { font-weight: var(--weight-semibold); }

        /* --- Buttons & Utilities --- */
        .btn-toggle {
            padding: 6px 14px; border-radius: var(--radius-pill); font-size: var(--text-xs);
            font-weight: var(--weight-semibold); cursor: pointer; border: 1px solid transparent;
            transition: all var(--t-base); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-pending { background: rgba(0,0,0,0.05); color: var(--text-secondary); }
        [data-theme="dark"] .btn-pending { background: rgba(255,255,255,0.1); }
        .btn-pending:hover { background: var(--border-default); }
        .btn-done { background: var(--success-soft); color: var(--success); border-color: var(--success); }

        .btn-exec {
            background: var(--accent); color: white; border: none; padding: 6px 12px;
            border-radius: 8px; font-size: 11px; font-weight: var(--weight-bold);
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
            transition: transform var(--t-base), box-shadow var(--t-base);
        }
        .btn-exec:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }

        .sys-tools { display: flex; gap: var(--space-3); margin-top: var(--space-5); }
        .tool-btn { flex: 1; background: transparent; border: 1px solid var(--border-default); padding: 8px; border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--text-secondary); cursor: pointer; text-align: center; transition: all var(--t-base); }
        .tool-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }

        /* --- LAYER 4: INSIGHT CHART --- */
        canvas { max-height: 220px; width: 100%; }

        @media (max-width: 768px) {
            .row-primary { flex-direction: column; align-items: flex-start; }
            .item-metrics { width: 100%; }
            .item-action { width: 100%; justify-content: flex-end; margin-top: var(--space-2); }
        }
    </style>
</head>
<body>

<div class="workspace-container">
    <header>
        <div class="brand">
            <h1>Athena <span>Workspace</span></h1>
            <p>Decision Surface · HP Victus 15</p>
        </div>
        <div class="theme-toggle">
            <button id="btnLight" class="theme-btn active" onclick="setTheme('light')">Light</button>
            <button id="btnDark" class="theme-btn" onclick="setTheme('dark')">Dark</button>
        </div>
    </header>

    <div class="layout-grid">
        <!-- Left Column: Layer 1 & 2 -->
        <div class="main-column">
            
            <!-- LAYER 1: COMMAND CORE -->
            <section class="command-core">
                <div class="core-top">
                    <div class="target-focus" id="focusZone">
                        <!-- Injected by JS -->
                    </div>
                    <div class="core-stats">
                        <div class="stat-group">
                            <div class="label">Pending Capital</div>
                            <div class="value" id="valKes">0 KES</div>
                        </div>
                        <div class="stat-group">
                            <div class="label">Architecture Progress</div>
                            <div class="value" id="valProg">0 / 8</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- LAYER 2: EXECUTION SURFACE -->
            <section class="execution-surface">
                <div class="surface-header">
                    <span class="surface-title">Optimization Matrix</span>
                    <span style="font-size: var(--text-xs); color: var(--text-muted);">Hover rows for specs</span>
                </div>
                <div id="executionRows">
                    <!-- Glass Rows injected by JS -->
                </div>
            </section>

        </div>

        <!-- Right Column: Layer 3 & 4 -->
        <div class="sidebar-column">
            
            <!-- LAYER 3: INTELLIGENCE STRIP -->
            <section class="intelligence-strip">
                
                <!-- Filters -->
                <div class="glass-panel">
                    <div class="panel-title">View Mode</div>
                    <div id="filterGroup">
                        <button class="filter-pill active" data-filter="All">All Operations</button>
                        <button class="filter-pill" data-filter="Hardware">Hardware Expansions</button>
                        <button class="filter-pill" data-filter="Software">System Overrides</button>
                        <button class="filter-pill" data-filter="paid">Paid Only</button>
                    </div>
                </div>

                <!-- Telemetry -->
                <div class="glass-panel">
                    <div class="panel-title">System Awareness</div>
                    <div class="health-item">
                        <span>Battery Health</span>
                        <span class="health-val" style="color: var(--success);">92.5%</span>
                    </div>
                    <div class="health-item">
                        <span>Charge Cycle</span>
                        <span class="health-val">231 (Capped 80%)</span>
                    </div>
                    <div class="health-item">
                        <span>RAM Topology</span>
                        <span class="health-val" style="color: var(--warning);">Single-Channel</span>
                    </div>
                </div>

                <!-- LAYER 4: INSIGHT CHART -->
                <div class="glass-panel">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-4);">
                        <span class="panel-title" style="margin:0;">Cost Distribution</span>
                        <div style="display: flex; gap: 4px; background: var(--surface-1); padding: 4px; border-radius: var(--radius-pill); border: 1px solid var(--border-soft);">
                            <button id="btnKes" class="theme-btn active" style="padding: 4px 10px;" onclick="setCurrency('KES')">KES</button>
                            <button id="btnUsd" class="theme-btn" style="padding: 4px 10px;" onclick="setCurrency('USD')">USD</button>
                        </div>
                    </div>
                    <canvas id="budgetChart"></canvas>
                </div>

                <!-- Utilities -->
                <div class="sys-tools">
                    <button class="tool-btn" onclick="exportJSON()">Export State</button>
                    <button class="tool-btn" onclick="hardReset()" style="color: var(--danger); border-color: rgba(255,59,48,0.3);">Reset Matrix</button>
                </div>

            </section>
        </div>
    </div>
</div>

<script>
    // --- Data Model ---
    const SEED_DATA = [
        { id:0, name:"8GB DDR4-3200 SODIMM", category:"Hardware", spec:"Micron/Generic, 1.2V CL22", price_kes:6999, price_usd:54, purpose:"Force dual-channel memory topology for CPU bandwidth.", impact:"+35% memory speed", priority:1, status:"Pending", script: null },
        { id:1, name:"CPU Min State Fix", category:"Software", spec:"powercfg override", price_kes:0, price_usd:0, purpose:"Prevent CPU from idling at base clock. Reduces thermals instantly.", impact:"Lower idle temps/power", priority:1, status:"Pending", script: "powercfg /setacvalueindex SCHEME_CURRENT SUB_PROCESSOR PROCTHROTTLEMIN 5" },
        { id:2, name:"HP Telemetry Disable", category:"Software", spec:"Service.msc override", price_kes:0, price_usd:0, purpose:"Kill background tracking services consuming RAM.", impact:"+150MB usable RAM", priority:1, status:"Pending", script: "Stop-Service 'HPAnalyticsService'; Set-Service 'HPAnalyticsService' -StartupType Disabled" },
        { id:3, name:"Battery Care Mode", category:"Software", spec:"80% Charge Cap", price_kes:0, price_usd:0, purpose:"Halt cell degradation at desk.", impact:"Preserves 92.5% health", priority:1, status:"Pending", script: null },
        { id:4, name:"Dahua 1TB NVMe Gen3", category:"Hardware", spec:"M.2 2280 NVMe", price_kes:13500, price_usd:104, purpose:"Mass storage for virtual machines and heavy projects.", impact:"+1TB capacity", priority:2, status:"Pending", script: null },
        { id:5, name:"PCI Express ASPM", category:"Software", spec:"Power Options → Moderate Power Savings", price_kes:0, price_usd:0, purpose:"Forces PCIe bus to low power state when inactive.", impact:"Improved battery on AC", priority:2, status:"Pending", script: "powercfg /setacvalueindex SCHEME_CURRENT SUB_PCIEXPRESS ASPM 1" },
        { id:6, name:"Laptop Cooling Stand", category:"Accessory", spec:"Dual-fan, Tilt-adjust", price_kes:3500, price_usd:27, purpose:"Increase structural airflow clearance during heavy rendering.", impact:"↓ thermals under load", priority:3, status:"Pending", script: null },
        { id:7, name:"HP M24fe IPS Monitor", category:"Accessory", spec:"1080p, 75Hz, sRGB 99%", price_kes:17500, price_usd:135, purpose:"Expand workstation surface area for code + preview split.", impact:"Dual-screen productivity", priority:4, status:"Pending", script: null }
    ];

    let items = JSON.parse(localStorage.getItem('athena_pro_v1')) || SEED_DATA;
    let currentFilter = "All";
    let chart = null;
    let currency = "KES";

    // --- State Management ---
    function save() { localStorage.setItem('athena_pro_v1', JSON.stringify(items)); }

    function setTheme(mode) {
        document.documentElement.setAttribute('data-theme', mode);
        document.getElementById('btnLight').classList.toggle('active', mode === 'light');
        document.getElementById('btnDark').classList.toggle('active', mode === 'dark');
        if(chart) renderChart(); 
    }
    
    function setCurrency(curr) {
        currency = curr;
        document.getElementById('btnKes').classList.toggle('active', curr === 'KES');
        document.getElementById('btnUsd').classList.toggle('active', curr === 'USD');
        renderChart();
    }

    function getPrioColor(p) {
        return p === 1 ? 'var(--danger)' : p === 2 ? 'var(--warning)' : p === 3 ? 'var(--accent)' : 'var(--pending)';
    }

    // --- Render Layer 1: Command Core ---
    function renderCommandCore() {
        const pending = items.filter(i => i.status === "Pending");
        const done = items.length - pending.length;
        const totalK = pending.reduce((s, i) => s + i.price_kes, 0);
        
        document.getElementById('valKes').innerText = `${totalK.toLocaleString()} KES`;
        document.getElementById('valProg').innerText = `${done} / ${items.length}`;

        const sorted = [...pending].sort((a,b) => a.priority - b.priority);
        const focusZone = document.getElementById('focusZone');

        if (sorted.length > 0) {
            const next = sorted[0];
            const type = next.price_kes === 0 ? "Zero-Cost System Fix" : "Capital Investment";
            let html = `
                <span class="focus-label">🎯 Strategic Focus</span>
                <div class="focus-title">${next.name}</div>
                <div class="focus-meta">Priority ${next.priority} · ${type}</div>
            `;
            if(next.script) {
                html += `<button class="btn-exec" style="margin-top:16px;" onclick="executeFix(event, ${next.id})">Execute Automation</button>`;
            }
            focusZone.innerHTML = html;
        } else {
            focusZone.innerHTML = `
                <span class="focus-label" style="color: var(--success)">✓ Operations Complete</span>
                <div class="focus-title">System Optimized</div>
                <div class="focus-meta">Athena is operating at peak architectural efficiency.</div>
            `;
        }
    }

    // --- Render Layer 2: Execution Surface ---
    function renderExecutionRows() {
        const container = document.getElementById('executionRows');
        container.innerHTML = "";

        let filtered = items.filter(i => {
            if (currentFilter === "All") return true;
            if (currentFilter === "paid") return i.price_kes > 0;
            return i.category === currentFilter;
        });
        
        filtered.sort((a,b) => {
            if(a.status !== b.status) return a.status === "Pending" ? -1 : 1;
            return a.priority - b.priority;
        });

        filtered.forEach(i => {
            const div = document.createElement('div');
            div.className = `glass-row ${i.status === 'Done' ? 'done-row' : ''}`;
            // Optional: click to expand on touch devices
            div.onclick = function(e) { 
                if(!e.target.closest('button')) this.classList.toggle('expanded'); 
            };

            const isFree = i.price_kes === 0;
            const costStr = isFree ? "Free" : `${i.price_kes.toLocaleString()} KES`;
            
            div.innerHTML = `
                <div class="row-primary">
                    <div class="item-main">
                        <div class="prio-dot" style="background: ${getPrioColor(i.priority)}"></div>
                        <div class="item-title">${i.name}</div>
                    </div>
                    <div class="item-metrics">
                        <div class="item-cost">${costStr}</div>
                        <div class="item-impact">${i.impact}</div>
                    </div>
                    <div class="item-action">
                        ${i.script && i.status === "Pending" ? `<button class="btn-exec" onclick="executeFix(event, ${i.id})">Run</button>` : ''}
                        <button class="btn-toggle ${i.status === 'Done' ? 'btn-done' : 'btn-pending'}" onclick="toggleStatus(event, ${i.id})">
                            ${i.status === 'Done' ? '✓ Done' : 'Pending'}
                        </button>
                    </div>
                </div>
                <div class="row-secondary">
                    <div class="row-details-inner">
                        <div style="flex:1"><strong>Spec:</strong> ${i.spec}</div>
                        <div style="flex:2"><strong>Architecture Goal:</strong> ${i.purpose}</div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- Render Layer 4: Insight Chart ---
    function renderChart() {
        const paid = items.filter(i => i.price_kes > 0);
        const ctx = document.getElementById('budgetChart').getContext('2d');
        if (chart) chart.destroy();

        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const accent = isDark ? '#0A84FF' : '#007AFF';

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: paid.map(i => i.name.split(' ')[0]),
                datasets: [{
                    data: paid.map(i => currency === 'KES' ? i.price_kes : i.price_usd),
                    backgroundColor: accent,
                    borderRadius: 6,
                    barThickness: 'flex',
                    maxBarThickness: 24
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)', drawBorder: false }, ticks: { color: isDark ? '#98989E' : '#86868B', font: { size: 11 } } },
                    x: { grid: { display: false }, ticks: { color: isDark ? '#98989E' : '#86868B', font: { size: 10 } } }
                }
            }
        });
    }

    // --- Interactions ---
    function toggleStatus(e, id) {
        if(e) e.stopPropagation();
        const i = items.find(x => x.id === id);
        i.status = i.status === "Pending" ? "Done" : "Pending";
        save(); refreshUI();
    }

    function executeFix(e, id) {
        if(e) e.stopPropagation();
        const i = items.find(x => x.id === id);
        const btn = e.target;
        btn.innerText = "Running...";
        btn.style.opacity = "0.5";
        console.log(`[ATHENA_SYSTEM] Executing: ${i.script}`);
        
        setTimeout(() => { i.status = "Done"; save(); refreshUI(); }, 800);
    }

    function exportJSON() {
        const date = new Date().toISOString().split('T')[0];
        const data = JSON.stringify({ exported: new Date().toISOString(), system: "HP Victus 15 Athena", items }, null, 2);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
        a.download = `athena_workspace_${date}.json`;
        a.click();
    }

    function hardReset() { if(confirm("Purge system state? All milestones will revert to Pending.")) { items = JSON.parse(JSON.stringify(SEED_DATA)); save(); refreshUI(); } }

    function refreshUI() { 
        renderCommandCore(); 
        renderExecutionRows(); 
        renderChart(); 
    }

    // --- Init ---
    document.getElementById('filterGroup').onclick = e => {
        if (e.target.tagName === "BUTTON") {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.getAttribute('data-filter');
            renderExecutionRows();
        }
    };

    window.onload = () => {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
        refreshUI();
    };
</script>
</body>
</html>
